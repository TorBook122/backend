services:
  postgres:
    image: postgres:16-alpine
    container_name: torbook-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: torbook
      POSTGRES_PASSWORD: torbook_dev
      POSTGRES_DB: torbook
    volumes:
      - torbook_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U torbook -d torbook']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: torbook-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - torbook_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  db-migrate:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
      target: migrate
    profiles:
      - app
    restart: 'no'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://torbook:torbook_dev@postgres:5432/torbook
    depends_on:
      postgres:
        condition: service_healthy

  shared:
    build:
      context: .
      dockerfile: packages/shared/Dockerfile
    profiles:
      - app
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3002
    expose:
      - '3002'

  db:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    profiles:
      - app
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://torbook:torbook_dev@postgres:5432/torbook
    expose:
      - '3003'
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  auth:
    build:
      context: .
      dockerfile: packages/auth/Dockerfile
    profiles:
      - app
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3004
      REDIS_URL: redis://redis:6379
    expose:
      - '3004'
    depends_on:
      redis:
        condition: service_healthy

  notifications:
    build:
      context: .
      dockerfile: packages/notifications/Dockerfile
    profiles:
      - app
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3005
      DB_SERVICE_URL: http://db:3003
    expose:
      - '3005'
    depends_on:
      db:
        condition: service_healthy

  queue-enqueue:
    build:
      context: .
      dockerfile: packages/queue/Dockerfile
      target: enqueue
    profiles:
      - app
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3006
    expose:
      - '3006'

  queue-worker:
    build:
      context: .
      dockerfile: packages/queue/Dockerfile
      target: worker
    profiles:
      - app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_SERVICE_URL: http://db:3003
      NOTIFICATIONS_SERVICE_URL: http://notifications:3005
    depends_on:
      db:
        condition: service_healthy
      notifications:
        condition: service_healthy
      queue-enqueue:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    profiles:
      - app
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file: .env
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      SHARED_SERVICE_URL: http://shared:3002
      DB_SERVICE_URL: http://db:3003
      AUTH_SERVICE_URL: http://auth:3004
      NOTIFICATIONS_SERVICE_URL: http://notifications:3005
      QUEUE_SERVICE_URL: http://queue-enqueue:3006
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      shared:
        condition: service_healthy
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
      queue-enqueue:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  torbook_pg_data:
  torbook_redis_data:
