services:
  postgres:
    image: postgres:16-alpine
    container_name: torbook-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: torbook
      POSTGRES_PASSWORD: torbook_dev
      POSTGRES_DB: torbook
    volumes:
      - torbook_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U torbook -d torbook']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: torbook-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - torbook_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      target: migrate
    profiles:
      - app
    restart: 'no'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://torbook:torbook_dev@postgres:5432/torbook
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    profiles:
      - app
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://torbook:torbook_dev@postgres:5432/torbook
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  queue-worker:
    build:
      context: .
      target: worker
    profiles:
      - app
    restart: 'no'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://torbook:torbook_dev@postgres:5432/torbook
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  torbook_pg_data:
  torbook_redis_data:
