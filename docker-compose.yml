x-app-env: &app-env
  env_file: .env

x-db-env: &db-env
  DATABASE_URL: postgresql://torbook:torbook_dev@postgres:5432/torbook
  REDIS_URL: redis://redis:6379

x-loopback-services: &loopback-services
  AUTH_SERVICE_URL: http://127.0.0.1:3002
  BOOKING_SERVICE_URL: http://127.0.0.1:3003
  QUEUE_SERVICE_URL: http://127.0.0.1:3004
  DB_SERVICE_URL: http://127.0.0.1:3010
  SHARED_SERVICE_URL: http://127.0.0.1:3011
  INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-dev-internal-secret}

networks:
  torbook-internal:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: torbook-postgres
    restart: unless-stopped
    networks:
      - torbook-internal
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: torbook
      POSTGRES_PASSWORD: torbook_dev
      POSTGRES_DB: torbook
    volumes:
      - torbook_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U torbook -d torbook']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: torbook-redis
    restart: unless-stopped
    networks:
      - torbook-internal
    ports:
      - '6379:6379'
    volumes:
      - torbook_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    <<: *app-env
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: torbook-app
    networks:
      - torbook-internal
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      <<: [*db-env, *loopback-services]
      PORT: 3001
      NODE_ENV: development
      AWS_SQS_QUEUE_URL: ''
      AWS_ENDPOINT_URL: ''
    command: ['sh', '-c', 'pnpm --filter @torbook/db exec prisma migrate deploy && pnpm dev:all']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3001/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

volumes:
  torbook_pg_data:
  torbook_redis_data:
