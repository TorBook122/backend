services:
  - type: web
    name: torbook-gateway
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm run render:build
    startCommand: corepack enable && node packages/gateway/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: REDIS_URL
        sync: false
      - key: AUTH_SERVICE_URL
        value: http://torbook-auth-service:10000
      - key: BOOKING_SERVICE_URL
        value: http://torbook-booking-service:10000
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: torbook-auth-service
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm run render:build
    startCommand: corepack enable && node packages/auth-service/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: AES_ENCRYPTION_KEY
        sync: false
      - key: INTERNAL_SERVICE_SECRET
        sync: false

  - type: web
    name: torbook-booking-service
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm run render:build
    startCommand: corepack enable && node packages/booking-service/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AES_ENCRYPTION_KEY
        sync: false
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: QUEUE_SERVICE_URL
        value: http://torbook-queue-worker:10000
      - key: AWS_REGION
        sync: false
      - key: AWS_SQS_QUEUE_URL
        sync: false

  - type: worker
    name: torbook-queue-worker
    runtime: docker
    dockerfilePath: ./packages/queue/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_SQS_QUEUE_URL
        sync: false
      - key: FCM_SERVICE_ACCOUNT_JSON
        sync: false
      - key: AES_ENCRYPTION_KEY
        sync: false
      - key: INTERNAL_SERVICE_SECRET
        sync: false
