services:
  - type: web
    name: torbook
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: AES_ENCRYPTION_KEY
        sync: false
      - key: INTERNAL_SERVICE_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_SQS_QUEUE_URL
        sync: false
      - key: FCM_SERVICE_ACCOUNT_JSON
        sync: false
      - key: NOMINATIM_USER_AGENT
        sync: false
