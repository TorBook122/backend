services:
  - type: web
    name: torbook-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm run render:build
    startCommand: corepack enable && pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: AES_ENCRYPTION_KEY
        sync: false
      - key: FCM_SERVICE_ACCOUNT_JSON
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_SQS_QUEUE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
