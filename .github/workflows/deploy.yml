# Backend deploy is handled by Railway, not GitHub Actions:
# - backend_staging → Railway Staging
# - main → Railway Production
#
# Keep this file only as documentation. Do not add a competing deploy job here
# unless you intentionally move off Railway.

name: Deploy

on:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Railway handles deploy
        run: |
          echo "Deploy is configured in Railway:"
          echo "  backend_staging → Staging environment"
          echo "  main → Production environment"
          echo "No GitHub Actions deploy step is required."
