# Backend deploy is handled by Railway (not this workflow).
#
# Flow:
# - backend_staging → Railway Staging: GitHub autodeploy ON (automatic)
# - backend_production → Railway Production: GitHub autodeploy OFF
#   Deploy manually: Railway CMD/CTRL+K → "Deploy Latest Commit"
#
# CI (ci.yml) runs on push/PR to main, backend_staging, backend_production.

name: Deploy

on:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Railway deploy reminder
        run: |
          echo "backend_staging: CI + automatic Railway Staging deploy"
          echo "backend_production: CI on push; Railway Production deploy is manual"
          echo "  Railway → Command Palette (CMD/CTRL+K) → Deploy Latest Commit"
